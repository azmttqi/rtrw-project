version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: db_rtrw2
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=karawang3
      - POSTGRES_DB=rtrw
    ports:
      - "5433:5432"
    volumes:
      - ./database/rtrw.sql:/docker-entrypoint-initdb.d/rtrw.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rtrw"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rtrw_network

  backend:
    build: ./backend
    container_name: backend_rtrw
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=karawang3
      - DB_NAME=rtrw
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rtrw_network

networks:
  rtrw_network:
    driver: bridge

volumes:
  postgres_data:
